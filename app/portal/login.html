<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Patient Portal - eDermX 2026</title>
<link rel="icon" href="../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/ederm.css">
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <img class="logo" src="../assets/logo-ederm.png" alt="eDerm">
    <h1 class="auth-title">Patient Portal</h1>
    <p class="auth-sub">Sign in to Dermatology of Springfield</p>
    <form class="auth-form" action="verify.html">
      <div class="field">
        <label class="label">Account number</label>
        <input class="input" placeholder="e.g. 9496928" value="9496928">
      </div>
      <div class="field">
        <label class="label">Last name</label>
        <input class="input" placeholder="Last name" value="Singh">
      </div>
      <div class="field">
        <label class="label">Date of birth</label>
        <input class="input" type="date" value="1986-12-13">
      </div>
      <button class="btn btn-primary btn-lg btn-block" type="submit">Sign in</button>
    </form>
    <div class="auth-links"><a href="#">Forgot account number?</a></div>
    <p class="auth-foot">Protected health information. Authorized patients only.<br>&copy; eDerm Systems 2007&ndash;2026</p>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify identity - Patient Portal - eDermX 2026</title>
<link rel="icon" href="../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/ederm.css">
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <img class="logo" src="../assets/logo-ederm.png" alt="eDerm">
    <h1 class="auth-title">Verify it's you</h1>
    <p class="auth-sub">Choose how you'd like to receive your one-time code</p>
    <form class="auth-form" action="dashboard.html">
      <label class="radio-row"><input type="radio" name="method" checked> Text message to (xxx) xxx-4984</label>
      <label class="radio-row"><input type="radio" name="method"> Voice call to (xxx) xxx-4984</label>
      <button class="btn btn-primary btn-lg btn-block" type="submit">Send code</button>
    </form>
    <div class="auth-links"><a href="login.html">Back to sign in</a></div>
    <p class="auth-foot">The code expires after 10 minutes.</p>
  </div>
</div>
</body>
</html>
